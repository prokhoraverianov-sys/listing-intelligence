<title>Listing Intelligence</title>
<style>
:root{
  --bg:#1c1c1e; --surface:#242426; --surface2:#2d2d30; --border:#3a3a3d;
  --fg:#f2f2f3; --muted:#93939a; --accent:#5d78b3;
  --good:#6fae7d; --warn:#c9a35d; --bad:#c4646c;
  --heat1:#26282f; --heat2:#3a4566; --heat3:#4c5e8f; --heat4:#5d78b3;
}
*{box-sizing:border-box}
html{color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;margin:0;padding:20px;font-size:14px}
h1{font-size:1.25rem;margin:0;letter-spacing:.01em}
.mutedlab{color:var(--muted);font-size:.68rem;letter-spacing:.07em;text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;transition:border-color .25s,transform .25s,box-shadow .25s}
.header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.header .grow{flex:1}
#search{background:var(--surface2);border:1px solid var(--border);color:var(--fg);border-radius:.6rem;padding:8px 12px;width:230px;font-size:.85rem;outline:none}
#search:focus{border-color:var(--accent)}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:.7rem;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .2s}
.tab:hover{border-color:var(--accent)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.chip{padding:5px 11px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.75rem;user-select:none;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--fg)}
.chip.on{background:color-mix(in srgb,var(--accent) 25%,var(--surface));border-color:var(--accent);color:var(--fg)}
.chip.neg.on{background:color-mix(in srgb,var(--bad) 22%,var(--surface));border-color:var(--bad)}
.seg{display:flex;gap:0;border:1px solid var(--border);border-radius:.7rem;overflow:hidden;margin-right:6px}
.seg .segbtn{padding:5px 12px;background:var(--surface);color:var(--muted);cursor:pointer;font-size:.75rem;border-right:1px solid var(--border);user-select:none}
.seg .segbtn:last-child{border-right:none}
.seg .segbtn.on{background:var(--accent);color:#fff}
.statrow{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat{padding:6px 12px;display:flex;align-items:baseline;gap:8px;border-radius:.6rem}
.stat .v{font-size:.95rem;font-weight:600;font-variant-numeric:tabular-nums}
.stat .l{margin-top:0;font-size:.62rem}
.tablewrap{position:relative;border-radius:1rem}
.tablescroll{overflow-x:auto;border-radius:1rem}
table{border-collapse:collapse;font-size:.74rem;min-width:900px}
th{position:sticky;top:0;background:var(--surface2);color:var(--muted);text-align:left;padding:7px 10px;font-size:.62rem;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap;z-index:2}
th:hover{color:var(--fg)}
th .arr{color:var(--accent)}
th.exhead{text-align:center;padding:4px}
th .resizer{position:absolute;right:0;top:0;width:6px;height:100%;cursor:col-resize;z-index:3}
th .resizer:hover,th .resizer.active{background:var(--accent)}
td{padding:6px 10px;border-top:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums}
th:first-child,td:first-child{padding-left:16px}
.scrollnav{position:absolute;top:0;bottom:0;width:30px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--surface2) 0,transparent);cursor:pointer;z-index:6;color:var(--fg);font-size:1.2rem;opacity:.75;user-select:none;border-radius:1rem 0 0 1rem}
.scrollnav:hover{opacity:1}
.scrollnav.right{right:0;left:auto;border-radius:0 1rem 1rem 0;background:linear-gradient(270deg,var(--surface2) 0,transparent)}
tbody tr{cursor:pointer}
tbody tr:hover td{background:color-mix(in srgb,var(--accent) 8%,transparent)}
.tick{font-weight:600;color:var(--fg)}
.pos{color:var(--good)}.neg2{color:var(--bad)}
.exdot{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:5px;margin-right:2px;background:var(--heat1);border:1px solid transparent}
.exdot img{width:13px;height:13px;border-radius:2px;display:block}
.exdot span.fallback{font-size:.55rem;font-weight:700;color:#cfd6e6}
.exdot.hi{background:var(--heat4);box-shadow:0 0 0 1px color-mix(in srgb,var(--heat4) 60%,#fff)}
.exdot.lo{background:var(--heat2);border-color:var(--border)}
.exdot.off{background:transparent;border:1px solid var(--border)}
.exdot.off img{filter:grayscale(1);opacity:.28}
.exdot.off span.fallback{opacity:.3}
th.exhead .exdot{width:16px;height:16px}
th.exhead img{width:11px;height:11px}
.tab img{width:14px;height:14px;border-radius:3px;vertical-align:-2px;margin-right:5px}
.tab img+img{margin-left:-2px}
.chip img{width:12px;height:12px;border-radius:2px;vertical-align:-2px;margin-right:4px}
.chip.on::before{content:"✓ ";font-weight:700}
th.grp{text-align:center;border-left:1px solid var(--border)}
th.sub{text-align:center;font-size:.62rem;padding:5px 8px}
.exbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:.7rem;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.8rem;user-select:none;transition:all .15s}
.exbtn img{width:15px;height:15px;border-radius:3px}
.exbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.exbtn.off img{filter:grayscale(1);opacity:.4}
.exblock{display:inline-flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;border-radius:.8rem;border:1px solid var(--border);background:var(--surface2)}
.exblock.blockoff{opacity:.5}
.exblock .seg.minis{margin-right:0}
.exblock .minis .segbtn{padding:3px 9px;font-size:.68rem}
th[draggable]{cursor:grab}
th.dragging{opacity:.4}
th.dragover{box-shadow:inset 3px 0 0 var(--accent)}
#legend{display:none;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:.72rem;margin:0 2px 10px;align-items:center}
#legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.controlbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:.8rem;padding:8px 10px;margin-bottom:10px}
.controlbar .exselrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.controlbar .grow{flex:1}
.controlbar #search{width:190px}
.colpicker{position:absolute;right:0;top:110%;z-index:10;background:var(--surface2);border:1px solid var(--border);border-radius:.7rem;padding:8px;min-width:200px;max-height:320px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.colpicker label{display:flex;align-items:center;gap:7px;padding:4px 6px;font-size:.78rem;cursor:pointer;border-radius:.4rem}
.colpicker label:hover{background:var(--surface)}
.colpicker input{accent-color:var(--accent)}
.colpicker .cpfoot{border-top:1px solid var(--border);margin-top:4px;padding-top:6px;display:flex;gap:8px}
.colpicker .cpfoot span{font-size:.72rem;color:var(--accent);cursor:pointer}
.pat-section{grid-column:1/-1;padding:10px 18px;border-radius:.7rem;background:var(--surface2);border:1px solid var(--border)}
.pat-section h2{margin:0;font-size:.9rem}
.pat-section p{margin:4px 0 0;font-size:.75rem;color:var(--muted)}
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:.65rem;font-weight:600;margin-right:3px;letter-spacing:.03em}
.b-viktor{background:color-mix(in srgb,var(--bad) 30%,var(--surface));color:#e8a7ad}
.b-tv{background:color-mix(in srgb,var(--warn) 28%,var(--surface));color:#e3c88f}
.b-alpha{background:color-mix(in srgb,var(--accent) 30%,var(--surface));color:#aebfe0}
.b-hl{background:color-mix(in srgb,var(--good) 25%,var(--surface));color:#a5cfae}
.detail{background:var(--surface2)}
.detail td{white-space:normal;padding:14px 16px}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.dgrid h4{margin:0 0 6px;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.dgrid a{color:var(--accent);text-decoration:none}
.dgrid a:hover{text-decoration:underline}
.exrow{display:flex;justify-content:space-between;gap:10px;padding:2px 0;font-size:.8rem}
.exrow .v{color:var(--muted)}
.note{font-size:.8rem;line-height:1.45;color:#d5d5d8}
.pat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.pat-card{padding:16px 18px}
.pat-card h3{margin:0 0 10px;font-size:.85rem}
.pat-card.wide{grid-column:1/-1}
.bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:.78rem}
.bar .fill{height:14px;border-radius:4px;background:var(--accent);min-width:2px}
.bar .lb{width:150px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar .n{font-variant-numeric:tabular-nums}
.count{color:var(--muted);font-size:.78rem;margin:8px 2px}
ul.flist{margin:0;padding-left:18px;font-size:.8rem;line-height:1.6;color:#d5d5d8}
ul.flist li{margin-bottom:4px}
ul.flist b{color:var(--fg)}
@media(prefers-reduced-motion:no-preference){
  .fade{animation:in .35s ease-out backwards}
  @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
}
</style>

function attachResizers(){
  document.querySelectorAll("#thead th[data-k]").forEach(th=>{
    const k=th.dataset.k;
    const w=(colWidth[tab]||{})[k];
    if(w) th.style.width=w+"px";
    const rz=document.createElement("span"); rz.className="resizer";
    th.appendChild(rz);
    rz.onmousedown=e=>{
      e.preventDefault(); e.stopPropagation();
      rz.classList.add("active");
      const startX=e.clientX, startW=th.offsetWidth;
      const onMove=e2=>{ th.style.width=Math.max(30,startW+(e2.clientX-startX))+"px"; };
      const onUp=()=>{
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
        rz.classList.remove("active");
        colWidth[tab]=colWidth[tab]||{};
        colWidth[tab][k]=th.offsetWidth;
        saveWidth();
        justDragged=true; setTimeout(()=>justDragged=false,150);
      };
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    };
  });
}

function val(r,k){
  if(k.startsWith("ex_")) return r.spot[k.slice(3)]||0;
  if(k.startsWith("pex_")) return r.perps.includes(k.slice(4))?1:0;
  switch(k){
    case "fdv": return r.market?.fdv??null;
    case "mcap": return r.market?.mcap??null;
    case "vol24h": return r.market?.vol24h??null;
    case "chg30d": return r.market?.chg30d??null;
    case "vcat": return r.viktor?.category??"";
    case "vroi": return r.viktor?.roi_x??null;
    case "voitop": return r.viktor?.oi_top_usd??null;
    case "vvoltop": return r.viktor?.vol_top_usd??null;
    case "vliq": return r.viktor?.liq_top_usd??null;
    case "exmatrix": return Object.keys(r.spot).length;
    case "perpmx": return r.perps.length;
    case "oi": return r.oi_usd??null;
    case "oi_d6h": return r.oi_d6h??null;
    case "oi_d1h": return r.oi_d1h??null;
    case "corr_btc": return r.corr_btc_7d??null;
    case "corr_btc1": return r.corr_btc_1d??null;
    case "signal": return r.signal?1:0;
    case "path": return (r.listing_events||[]).length;
    case "flags": return (r.viktor?2:0)+(r.tv_section?1:0);
    default: return r[k];
  }
}

function baseRows(){
  if(tab==="bn") return rows.filter(r=>{
    const isSpot=r.bn_spot, isFut=r.bn_perp;
    if(!((bnMode.spot&&isSpot)||(bnMode.fut&&isFut))) return false;
    if(bnMode.manipOnly&&!(r.viktor||r.tv_section)) return false;
    return true;
  });
  const exMatch = r => EXSEL_CFG[tab].exs.some(e=>{
    const m=exSel[tab][e];
    return m.on&&((m.spot&&r.spot[e])||(m.fut&&EXSEL_CFG[tab].perp.includes(e)&&r.perps.includes(e)));
  });
  if(tab==="other") return rows.filter(exMatch);
  if(tab==="cand") return rows.filter(r=>!r.bn_perp&&exMatch(r));
  if(tab==="manip") return rows.filter(r=>r.viktor||r.tv_section);
  return [];
}

function filtered(){
  let rs = baseRows();
  const chips = CHIPS[tab];
  for(const [id,,fn] of chips){ if(filters[id]) rs = rs.filter(fn); }
  if(q) rs = rs.filter(r=>r.ticker.toLowerCase().includes(q)||(r.market?.name||"").toLowerCase().includes(q));
  rs = [...rs].sort((a,b)=>{
    let x=val(a,sortKey), y=val(b,sortKey);
    if(x==null&&y==null)return 0; if(x==null)return 1; if(y==null)return -1;
    if(typeof x==="string") return sortDir*x.localeCompare(y);
    return sortDir*(x-y);
  });
  return rs;
}

function exState(r,e){
  const has = e==="Binance" ? (r.bn_spot||!!r.spot[e]) : !!r.spot[e];
  if(!has) return "off";
  const vol = r.spot[e]||0;
  return vol>1e6?"hi":"lo";
}
function exCells(r){
  return EXS.map(e=>{
    const st = exState(r,e);
    const vol = r.spot[e]||0;
    return `<span class="exdot ${st}" title="${e}${st!=="off"?": $"+fmt$(vol):": not listed"}">${exIcon(e)}</span>`;
  }).join("");
}
function perpCells(r,exclBN){
  const list = exclBN? r.perps.filter(e=>e!=="Binance"):r.perps;
  return PERP_EXS.filter(e=>!exclBN||e!=="Binance").map(e=>{
    const has=list.includes(e);
    return `<span class="exdot ${has?"hi":"off"}" title="${e} perp${has?"":": not listed"}">${exIcon(e)}</span>`;
  }).join("");
}
function pathSteps(r){
  // group dated listing events by date (same-day = one step)
  const ev=r.listing_events||[];
  const byDate={};
  ev.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });
  return Object.keys(byDate).sort().map(date=>({date, items:byDate[date]}));
}
function evLabel(e){ return e.kind==="alpha"?"Alpha":`${e.ex} ${e.kind==="perp"?"fut":"spot"}`; }
function pathCell(r){
  const steps=pathSteps(r);
  if(!steps.length) return "—";
  return steps.map(s=>{
    const exs=[...new Set(s.items.map(i=>i.ex))];
    return `<span title="${s.date}: ${s.items.map(evLabel).join(", ")}">${exs.map(e=>e==="Alpha"?'<span class="badge b-alpha">A</span>':`<span class="exdot lo">${exIcon(e)}</span>`).join("")}</span>`;
  }).join('<span style="color:var(--muted)">→</span>');
}
function timelineHTML(r){
  const steps=pathSteps(r);
  if(!steps.length) return "";
  let prev=null, h="";
  steps.forEach(s=>{
    const lag = prev? Math.round((new Date(s.date)-new Date(prev))/86400000) : null;
    h+=`<div class="exrow"><span>${lag!=null?`+${lag}d · `:""}${s.date}</span><span class="v">${s.items.map(evLabel).join(", ")}</span></div>`;
    prev=s.date;
  });
  return `<div><h4>Listing timeline</h4>${h}<p class="note" style="margin:6px 0 0">Dates from exchange APIs (Binance, Bybit fut, OKX, Gate, Bitget). Venues without a public listing-time API are not shown.</p></div>`;
}

function corrCell(c){

  const a=Math.abs(c);
  const cls = a<0.3?"neg2":a>=0.7?"pos":"";
  return `<span class="${cls}">${Math.round(c*100)}%</span>`;
}
function flagBadges(r){
  let h="";
  if(r.viktor) h+=`<span class="badge b-viktor">VIKTOR</span>`;
  if(r.tv_section) h+=`<span class="badge b-tv">TV</span>`;
  if(r.alpha) h+=`<span class="badge b-alpha">ALPHA</span>`;
  if(r.on_hl) h+=`<span class="badge b-hl">HL</span>`;
  if(r.parked_oi) h+=`<span class="badge b-viktor" title="OI/Vol > 2× — positions sit without trading">⚠ PARKED OI</span>`;
  if(r.perp_priced) h+=`<span class="badge b-tv" title="perp OI dwarfs spot volume — price is set on the perp">⚠ PERP-PRICED</span>`;
  if(!r.perps.length) h+=`<span class="badge" style="background:var(--heat1);color:var(--muted)" title="No perp market on any tracked exchange — OI/funding/L-S structurally not applicable">SPOT ONLY</span>`;

}

function activeOtherExs(t){ t=t||tab; return EXSEL_CFG[t].exs.filter(e=>exSel[t][e].on); }
function exSubCols(e,t){
  t=t||tab;
  const m=exSel[t][e], out=[];
  if(m.fut&&EXSEL_CFG[t].perp.includes(e)) out.push(["pex_"+e,"Fut"]);
  if(m.spot) out.push(["ex_"+e,"Spot"]);
  return out;
}
function otherCols(){
  const cols=[["ticker","Ticker"]];
  const lead=COLS[tab].filter(([k])=>k==="score"||k==="signal");
  lead.forEach(c=>cols.push(c));
  activeOtherExs().forEach(e=>exSubCols(e).forEach(c=>cols.push(c)));
  let rest=COLS[tab].filter(([k])=>!k.startsWith("ex_")&&!k.startsWith("pex_")&&k!=="ticker"&&k!=="score"&&k!=="signal"&&k!=="exmatrix"&&k!=="perpmx");
  const ord=colOrder[tab];
  if(ord){
    const map=new Map(rest.map(c=>[c[0],c]));
    const sorted=ord.filter(k=>map.has(k)).map(k=>map.get(k));
    rest.forEach(c=>{ if(!ord.includes(c[0])) sorted.push(c); });
    rest=sorted;
  }
  rest.forEach(c=>cols.push(c));
  return cols;
}
let justDragged=false;
function attachDnd(cols){
  let dragK=null, lastOver=null;
  document.querySelectorAll('#thead th[draggable="true"]').forEach(th=>{
    th.ondragstart=e=>{dragK=th.dataset.k; th.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",dragK);}catch(_){}};
    th.ondragend=()=>{th.classList.remove("dragging"); if(lastOver)lastOver.classList.remove("dragover"); dragK=null;};
    th.ondragover=e=>{
      e.preventDefault(); e.dataTransfer.dropEffect="move";
      if(lastOver&&lastOver!==th) lastOver.classList.remove("dragover");
      if(th.dataset.k!==dragK){ th.classList.add("dragover"); lastOver=th; }
    };
    th.ondrop=e=>{
      e.preventDefault();
      if(lastOver) lastOver.classList.remove("dragover");
      const tgt=th.dataset.k;
      if(!dragK||dragK===tgt) return;
      const keys=cols.map(c=>c[0]);
      if(!keys.includes(dragK)||!keys.includes(tgt)) return;
      keys.splice(keys.indexOf(tgt),0,keys.splice(keys.indexOf(dragK),1)[0]);
      colOrder[tab]=keys; saveOrder();
      justDragged=true; setTimeout(()=>justDragged=false,150);
      renderTable();
    };
  });
}
function renderTable(){
  const cols = applyVis(EXSEL_CFG[tab]? otherCols() : orderCols(COLS[tab]));
  const arr = k => sortKey===k?`<span class="arr">${sortDir>0?"▲":"▼"}</span>`:"";
  if(EXSEL_CFG[tab]){
    const lead = cols.filter(([k])=>k==="score"||k==="signal");

    r1+=lead.map(([k,l])=>`<th rowspan="2" data-k="${k}"${thTitle(k)}>${l} ${arr(k)}</th>`).join("");
    activeOtherExs().forEach(e=>{
      const span=exSubCols(e).length;
      if(span) r1+=`<th class="grp exhead" colspan="${span}" title="${e}"><span class="exdot hi">${exIcon(e)}</span></th>`;});
    r1+=rest.map(([k,l])=>`<th rowspan="2" data-k="${k}" draggable="true"${thTitle(k)}>${l} ${arr(k)}</th>`).join("")+"</tr>";
    let r2="<tr>";

    r2+="</tr>";
    document.getElementById("thead").innerHTML=r1+r2;
  } else {
    document.getElementById("thead").innerHTML="<tr>"+cols.map(([k,l])=>{
      const isEx = k.startsWith("ex_")||k.startsWith("pex_");
      const label = isEx? `<span class="exdot ${k.startsWith("pex_")?"lo":"hi"}" title="${l}">${exIcon(k.startsWith("ex_")?k.slice(3):k.slice(4))}</span>` : l;
      return `<th class="${isEx?'exhead':''}" data-k="${k}" ${isEx?`title="${l}"`:thTitle(k)} draggable="true">${label} ${arr(k)}</th>`;
    }).join("")+"</tr>";
  }
  attachDnd(cols);
  attachResizers();
  document.querySelectorAll("th").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(!k||justDragged) return;
    if(sortKey===k)sortDir*=-1; else {sortKey=k;sortDir=-1;}
    renderTable();
  });
  const rs=filtered();
  document.getElementById("count").textContent=rs.length+" tokens";
  const tb=document.getElementById("tbody");
  tb.innerHTML=rs.slice(0,600).map(r=>`<tr data-t="${r.ticker}">`+cols.map(([k])=>{
    const help=cellHelp(r,k);
    return `<td${help?` title="${help.replace(/"/g,'&quot;')}"`:""}>${cell(r,k)}</td>`;
  }).join("")+"</tr>").join("");
  tb.querySelectorAll("tr").forEach(tr=>tr.onclick=()=>{
    const t=tr.dataset.t;
    const existing=tb.querySelector(".detail");
    if(existing)existing.remove();
    if(openDetail===t){openDetail=null;return;}
    openDetail=t;
    const r=rs.find(x=>x.ticker===t);
    const dtr=document.createElement("tr");dtr.className="detail";
    dtr.innerHTML=`<td colspan="${cols.length}">${detailHTML(r)}</td>`;
    tr.after(dtr);
  });
}

    const wf=rows.filter(r=>r.funding!=null);

    const negS=scamF.filter(r=>r.funding<0).length, negO=orgF.filter(r=>r.funding<0).length;
    const medOi=a=>{const v=a.map(r=>r.oi_mcap).filter(x=>x!=null);return median(v);};
    const sig={squeeze:0,dark_current:0,overheated:0};
    rows.forEach(r=>{if(r.signal)sig[r.signal]++;});
    const wc=rows.filter(r=>r.corr_btc_7d!=null);
    const scamC=wc.filter(r=>r.viktor||r.tv_section), orgC=wc.filter(r=>!r.viktor&&!r.tv_section);
    const low=a=>a.length?Math.round(a.filter(r=>Math.abs(r.corr_btc_7d)<0.3).length/a.length*100):0;
    return `
  <div class="card pat-card fade"><h3>Funding & OI — Manipulated vs Organic</h3>
    <div class="bar"><span class="lb">negative funding (manip)</span><span class="n">${scamF.length?Math.round(negS/scamF.length*100):0}% of ${scamF.length}</span></div>
    <div class="bar"><span class="lb">negative funding (organic)</span><span class="n">${orgF.length?Math.round(negO/orgF.length*100):0}% of ${orgF.length}</span></div>

    <div class="bar"><span class="lb">median OI/MCap (organic)</span><span class="n">${medOi(orgF)!=null?(medOi(orgF)*100).toFixed(0)+"%":"—"}</span></div>
    <p class="note">First live check of Viktor's "negative funding" rule against real funding rates (Binance→Bybit→Bitget). High OI/MCap with negative funding = crowded shorts against a controlled float.</p></div>
  <div class="card pat-card fade"><h3>BTC correlation (7d) — Manipulated vs Organic</h3>
    <div class="bar"><span class="lb">|corr| &lt; 0.3 (manip)</span><span class="n">${low(scamC)}% of ${scamC.length}</span></div>
    <div class="bar"><span class="lb">|corr| &lt; 0.3 (organic)</span><span class="n">${low(orgC)}% of ${orgC.length}</span></div>
    <p class="note">Viktor's "uncorrelated price action" rule measured directly: share of coins whose 7-day daily returns are essentially independent of BTC.</p></div>
  <div class="pat-section fade"><h2>C · Live signals — what to act on now</h2>
    <p>The actionable layer. Signals refresh every 30 min; per Viktor's playbook: long the pump by default, short only after a climax squeeze with hard invalidation.</p></div>
  <div class="card pat-card fade"><h3>⚡ Squeeze watch (${sig.squeeze})</h3>
    <p class="note">${sigRows("squeeze")}</p>
    <p class="note">Negative funding while price climbs — shorts are paying longs and fueling the move. Prime long-continuation setups.</p></div>
  <div class="card pat-card fade"><h3>Dark current (${sig.dark_current})</h3>
    <p class="note">${sigRows("dark_current")}</p>
    <p class="note">Heavy OI + negative funding on a flat price — quiet accumulation before a potential pump. Watchlist candidates.</p></div>
  <div class="card pat-card fade"><h3>Overheated (${sig.overheated}) · OI Δ 6h movers</h3>
    <p class="note">${sigRows("overheated")}</p>
    ${oiMovers.length?oiMovers.map(r=>`<div class="bar"><span class="lb">${r.ticker}</span><span class="n ${r.oi_d6h>0?"pos":"neg2"}">${fmtP(r.oi_d6h)}</span></div>`).join(""):`<p class="note">OI Δ 6h appears after ~6h of accumulated snapshots (collecting every 30 min).</p>`}
    <p class="note">Overheated = crowded longs after a &gt;30% weekly run — squeeze risk flips to the downside. OI movers = biggest 6h open-interest changes.</p></div>`;
  })()}
  <div class="pat-section fade"><h2>D · Reference sets — historical base rates</h2>
    <p>Scale and typology of past pumps: use to calibrate expectations for size, duration and archetype of the current setups.</p></div>
  <div class="card pat-card fade"><h3>Viktor pump categories</h3>
    ${vcatSorted.map(([l,n])=>`<div class="bar"><span class="lb">${l}</span><div class="fill" style="width:${n/maxVcat*160}px"></div><span class="n">${n}</span></div>`).join("")||"<p class='note'>no data</p>"}
    <p class="note">Pump archetypes from Viktor's own classification of past manipulated coins (e.g. "high FDV" = the low-mindshare/high-FDV pattern) — shows which archetype recurs most.</p></div>
  <div class="card pat-card fade"><h3>ROI distribution (Viktor set)</h3>
    ${roiDist.map(([l,n])=>`<div class="bar"><span class="lb">${l}</span><div class="fill" style="width:${n/maxRoi*160}px"></div><span class="n">${n}</span></div>`).join("")}
    <p class="note">Peak ROI top before the climax squeeze / invalidation, per Viktor's manipulated-coin playbook.</p></div>
  <div class="card pat-card fade"><h3>TradingView "MANIPULATED COINS" watchlist</h3>
    <div class="bar"><span class="lb">Short-term interest</span><div class="fill" style="width:${tvCounts.SHORT_TERM_INTEREST/maxTv*160}px"></div><span class="n">${tvCounts.SHORT_TERM_INTEREST}</span></div>
    <div class="bar"><span class="lb">Full list</span><div class="fill" style="width:${tvCounts.FULL_LIST/maxTv*160}px"></div><span class="n">${tvCounts.FULL_LIST}</span></div>
    <div class="bar"><span class="lb">Old</span><div class="fill" style="width:${tvCounts.OLD/maxTv*160}px"></div><span class="n">${tvCounts.OLD}</span></div>
    <p class="note">Short-term interest = newer suspected names actively being watched; Full list = the complete watchlist; Old = previously flagged names that already played out. Source: thedefivillain TradingView watchlist, 159 tickers.</p></div>
  <div class="card pat-card wide fade"><h3>Viktor's scam-coin signature (framework)</h3>
    <ul class="flist">
      <li><b>Uncorrelated price action</b> — moves independent of overall market direction, inorganic pumps unrelated to BTC/ETH beta.</li>
      <li><b>Low mindshare, high FDV</b> — thin social/attention footprint relative to a large fully-diluted valuation.</li>
      <li><b>Negative funding</b> — perp funding stays negative through the pump, unlike organic listings.</li>
      <li><b>Not on Hyperliquid</b> — confirmed in this dataset: ${scam.length?Math.round(hlS/scam.length*100):0}% of scam-set BN-perp coins are on HL vs ${org.length?Math.round(hlO/org.length*100):0}% of organic.</li>
      <li><b>Spot volume concentrated on Bitget / BSC</b> — with TWAP-style orderbook prints rather than organic order flow.</li>
      <li><b>Strategy</b> — default to longs on the initial pump; only take shorts after a climax squeeze with a hard invalidation level (see ROI-top distribution above for typical blow-off scale).</li>
    </ul></div>`;
}

function render(){
  const tabIcon = id => id==="bn" ? exIcon("Binance") : id==="other" ? T1_EXS.map(e=>exIcon(e)).join("") : "";
  document.getElementById("tabs").innerHTML=TABS.map(([id,l])=>`<span class="tab ${tab===id?"active":""}" data-t="${id}">${tabIcon(id)}${l}</span>`).join("");
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{tab=t.dataset.t;filters={};openDetail=null;
    sortKey = tab==="cand"?"score":tab==="manip"?"vroi":tab==="other"?"vol24h":"bn_perp_date"; sortDir=-1; render();});
  const isPat=tab==="pat";
  document.querySelector(".tablewrap").style.display=isPat?"none":"";
  document.getElementById("chips").style.display=isPat?"none":"";
  document.querySelector(".controlbar").style.display=isPat?"none":"flex";
  const lg=document.getElementById("legend");
  lg.style.display=isPat?"none":"flex";
  lg.innerHTML=`<span><b>BTC corr:</b></span>
    <span><span class="sw" style="background:var(--bad)"></span>&lt;30% — uncorrelated, moves on its own (manipulation flag)</span>
    <span><span class="sw" style="background:#93939a"></span>30–70% — mixed</span>
    <span><span class="sw" style="background:var(--good)"></span>≥70% — follows BTC (organic beta)</span>
    <span style="margin-left:10px"><b>Funding:</b></span>
    <span><span class="sw" style="background:var(--bad)"></span>negative — shorts pay longs</span>
    <span><span class="sw" style="background:var(--good)"></span>positive — longs pay shorts</span>
    <span style="margin-left:10px">Drag column headers to reorder.</span>`;
  document.getElementById("patterns").style.display=isPat?"grid":"none";
  if(isPat){renderPatterns();return;}
  renderChips();renderTable();
}

function ago(sec){ if(sec==null) return "—"; if(sec<90) return sec+"s ago"; if(sec<5400) return Math.round(sec/60)+"m ago"; return Math.round(sec/3600)+"h ago"; }
const src=DATA.meta.sources||{};
document.getElementById("meta").innerHTML=`${DATA.meta.universe} tokens ·
  listings ${ago(src.listings)} · OI/funding ${ago(src.oi_funding)} · corr ${ago(src.corr)} ·
  spot matrix/derivs/dates ${ago(src.spot_matrix)} (daily) · auto-refresh every 30 min, self-hosted, no action needed`;

document.getElementById("colBtn").onclick=e=>{
  const pk=document.getElementById("colPicker");
  const show=pk.style.display==="none";
  if(show) renderColPicker();
  pk.style.display=show?"block":"none";
  e.stopPropagation();
};
document.addEventListener("click",e=>{
  const pk=document.getElementById("colPicker");
  if(pk.style.display!=="none"&&!pk.contains(e.target)&&e.target.id!=="colBtn") pk.style.display="none";
});

let searchDebounce=null;
document.getElementById("search").addEventListener("input",e=>{
  const v=e.target.value;
  clearTimeout(searchDebounce);
  searchDebounce=setTimeout(()=>{ q=v.trim().toLowerCase(); renderTable(); },150);
});
document.getElementById("scrollLeft").onclick=()=>document.getElementById("tablescroll").scrollBy({left:-320,behavior:"smooth"});
document.getElementById("scrollRight").onclick=()=>document.getElementById("tablescroll").scrollBy({left:320,behavior:"smooth"});

renderStats();render();
</script>
